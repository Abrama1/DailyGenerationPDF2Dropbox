<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DailyPDF2Dropbox — Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="container header">
      <div class="brand">
        <div class="logo">D</div>
        <div>
          <div class="title">DailyPDF2Dropbox</div>
          <div class="subtitle">Daily run logs & status</div>
        </div>
      </div>

      <div class="meta">
        <div class="pill" id="generatedAt">Loading…</div>
        <div class="pill">Timezone: Asia/Tbilisi</div>
      </div>
    </header>

    <main class="container">
      <section class="cards">
        <div class="card">
          <div class="card-label">Last run</div>
          <div class="card-value" id="lastRunStatus">—</div>
          <div class="card-muted" id="lastRunReason">—</div>
        </div>

        <div class="card">
          <div class="card-label">Last success date</div>
          <div class="card-value mono" id="lastSuccessKey">—</div>
          <div class="card-muted" id="lastSuccessHint">YYYYMMDD</div>
        </div>

        <div class="card">
          <div class="card-label">Last run time</div>
          <div class="card-value" id="lastRunTime">—</div>
          <div class="card-muted mono" id="lastRunDuration">—</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">Run logs</div>
            <div class="panel-subtitle" id="runsCount">—</div>
          </div>

          <div class="controls">
            <div class="segmented" role="tablist" aria-label="Filter logs">
              <button class="seg active" data-filter="all">All</button>
              <button class="seg" data-filter="uploaded">Uploaded</button>
              <button class="seg" data-filter="duplicates">Duplicates</button>
              <button class="seg" data-filter="errors">Errors</button>
            </div>

            <input
              class="search"
              id="searchInput"
              type="search"
              placeholder="Search (date, status, reason)…"
              autocomplete="off"
            />
          </div>
        </div>

        <div class="list" id="logList">
          <div class="empty">Loading logs…</div>
        </div>
      </section>

      <footer class="footer">
        <span class="mono">/site/data</span> is generated by the daily workflow and committed to the repo.
      </footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
