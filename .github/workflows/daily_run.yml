name: Daily run

on:
  workflow_dispatch:
  schedule:
    # 23:00 Asia/Tbilisi == 19:00 UTC
    # Using minute 07 to avoid top-of-hour delays
    - cron: "7 19 * * *"

permissions:
  contents: write

concurrency:
  group: daily-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run worker
        env:
          SOURCE_PDF_URL: ${{ secrets.SOURCE_PDF_URL }}
          DROPBOX_TARGET_FOLDER: ${{ secrets.DROPBOX_TARGET_FOLDER }}
          DB_PATH: "data/app.sqlite"

          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        run: |
          python -m app.worker.run_once

      - name: Commit updated state (DB + JSON)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/app.sqlite site/data/summary.json site/data/runs.json
            git commit -m "Update daily run logs"
            git push
          else
            echo "No changes to commit."
          fi